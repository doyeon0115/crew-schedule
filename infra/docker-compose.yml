# Crew Schedule — 로컬 개발 인프라 (PostgreSQL · Redis · Kafka)
# 사용: docker compose -f infra/docker-compose.yml up -d
#
# 백엔드/프론트는 로컬에서 직접 실행(./gradlew bootRun, npm run dev)하는 것을 기본으로 하고,
# 이 파일은 의존 미들웨어만 띄운다. (앱 컨테이너화는 Phase 8에서 추가)

services:
  postgres:
    image: postgres:16-alpine
    container_name: crew-postgres
    environment:
      POSTGRES_DB: crew_schedule
      POSTGRES_USER: crew
      POSTGRES_PASSWORD: crew1234
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crew -d crew_schedule"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crew-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kafka (KRaft 모드 — Zookeeper 불필요)
  kafka:
    image: bitnami/kafka:3.7
    container_name: crew-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka

volumes:
  postgres-data:
  redis-data:
  kafka-data:
